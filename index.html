<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f8f7f4">
<title>Dagstaat — Ordinatio Groep</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#f8f7f4;--white:#fff;--ink:#1a1a18;--ink2:#4a4a46;--ink3:#8a8a84;--ink4:#c8c8c2;
  --line:#e8e7e2;--line2:#d4d3cc;
  --acc:#2d5a8e;--acc-l:#edf3f9;--acc-m:#c8daf0;
  --grn:#1e7a4a;--grn-l:#eaf5ee;
  --amb:#b85c00;--amb-l:#fdf3e8;
  --red:#c0392b;--red-l:#fdf0ee;
  --r:12px;--rsm:8px;--rxs:6px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.06),0 2px 6px rgba(0,0,0,.04);
}
html,body{background:var(--cream);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--cream)}
header{background:var(--white);border-bottom:1px solid var(--line);padding:env(safe-area-inset-top) 0 0;position:sticky;top:0;z-index:100}
.header-inner{padding:16px 20px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--ink)}
.brand-sub{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.sync-pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:5px 10px;font-size:11px;font-weight:500;cursor:pointer}
.sync-pill.synced{background:var(--grn-l);border:1px solid rgba(30,122,74,.2);color:var(--grn)}
.sync-pill.syncing{background:var(--acc-l);border:1px solid var(--acc-m);color:var(--acc)}
.sync-pill.offline{background:var(--amb-l);border:1px solid rgba(184,92,0,.2);color:var(--amb)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-pill.syncing .sync-dot{animation:pulse .8s infinite}
.tabs{display:flex;border-top:1px solid var(--line)}
.tab{flex:1;padding:11px 0;text-align:center;font-size:13px;font-weight:500;color:var(--ink3);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.main{flex:1;overflow-y:auto;padding-bottom:80px}
.pane{display:none;padding:20px}
.pane.on{display:block}
.sec{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink3);font-weight:600;margin-bottom:10px}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.date-nav{width:32px;height:32px;background:var(--white);border:1px solid var(--line2);border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--ink2);flex-shrink:0;transition:all .15s}
.date-nav:hover{background:var(--cream);border-color:var(--acc-m)}
.date-display{flex:1;background:var(--white);border:1px solid var(--line2);border-radius:var(--rsm);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.date-day{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--ink);line-height:1}
.date-weekday{font-size:12px;font-weight:500;color:var(--acc)}
.date-month{font-size:11px;color:var(--ink3)}
.date-input-hidden{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
.entries-count{font-size:11px;color:var(--ink3);background:var(--cream);border-radius:20px;padding:2px 8px}
.form-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.form-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.form-card-title{font-size:13px;font-weight:600;color:var(--ink)}
.remove-btn{background:none;border:none;color:var(--ink4);cursor:pointer;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.remove-btn:hover{background:var(--red-l);color:var(--red)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);font-weight:600}
input[type=time],input[type=number],select{background:var(--cream);border:1px solid var(--line2);border-radius:var(--rsm);color:var(--ink);font-family:'DM Mono',monospace;font-size:15px;padding:9px 11px;width:100%;-webkit-appearance:none;appearance:none;outline:none;transition:border-color .15s}
select{font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
input:focus,select:focus{border-color:var(--acc);background:var(--white);box-shadow:0 0 0 3px var(--acc-l)}
input[type=time]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer}
.netto-row{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--grn-l);border-radius:var(--rsm);border:1px solid rgba(30,122,74,.15)}
.netto-label{font-size:11px;color:var(--grn);font-weight:500}
.netto-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--grn)}
.netto-row.warn{background:var(--amb-l);border-color:rgba(184,92,0,.15)}
.netto-row.warn .netto-label,.netto-row.warn .netto-val{color:var(--amb)}
.add-entry-btn{width:100%;background:var(--cream);border:1.5px dashed var(--line2);border-radius:var(--rsm);padding:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-entry-btn:hover{background:var(--acc-l);border-color:var(--acc-m);color:var(--acc)}
.save-btn{width:100%;background:var(--acc);color:white;border:none;border-radius:var(--rsm);padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:12px;position:relative}
.save-btn:hover{background:#234d7a}
.save-btn:disabled{opacity:.4;cursor:not-allowed}
.save-btn .spin{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:sp .7s linear infinite;position:absolute;right:16px;top:50%;transform:translateY(-50%)}
.save-btn.loading .spin{display:block}
@keyframes sp{to{transform:translateY(-50%) rotate(360deg)}}
.day-total{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.day-total-row{display:flex;align-items:center;justify-content:space-between}
.day-total-label{font-size:12px;color:var(--ink3);font-weight:500}
.day-total-val{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--acc)}
.day-total-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:12px;text-align:center;box-shadow:var(--shadow-sm)}
.stat-val{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.stat-val.blue{color:var(--acc)}.stat-val.green{color:var(--grn)}.stat-val.amber{color:var(--amb)}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin-top:3px;font-weight:500}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--ink)}
.mnav-btn{width:28px;height:28px;background:var(--white);border:1px solid var(--line2);border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ink2);transition:all .15s}
.mnav-btn:hover{border-color:var(--acc-m);color:var(--acc)}
.client-totals{background:var(--white);border:1px solid var(--line);border-radius:var(--r);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow-sm)}
.client-totals-header{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.client-totals-title{font-size:12px;font-weight:600;color:var(--ink);text-transform:uppercase;letter-spacing:.5px}
.client-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);gap:12px}
.client-row:last-child{border-bottom:none}
.client-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.client-name{flex:1;font-size:13px;font-weight:500;color:var(--ink)}
.client-hours{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--acc);min-width:50px;text-align:right}
.client-days{font-size:12px;color:var(--ink3);min-width:50px;text-align:right}
.client-km{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3);min-width:40px;text-align:right}
.entries-table{background:var(--white);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm)}
.entries-table-header{display:grid;grid-template-columns:80px 1fr 90px 50px;gap:4px;padding:9px 14px;background:var(--cream);border-bottom:1px solid var(--line)}
.th{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);font-weight:600}
.entry-row{display:grid;grid-template-columns:80px 1fr 90px 50px;gap:4px;padding:10px 14px;border-bottom:1px solid var(--line);align-items:center;cursor:pointer;transition:background .1s}
.entry-row:last-child{border-bottom:none}
.entry-row:hover{background:var(--cream)}
.entry-date-day{font-weight:600;color:var(--ink);font-size:13px}
.entry-hours-cell{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--acc);text-align:right}
.entry-km-cell{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3);text-align:right}
.empty-state{text-align:center;padding:48px 20px}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.empty-text{font-size:14px;color:var(--ink3)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);border-radius:20px;padding:10px 18px;font-size:13px;font-weight:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;max-width:92vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--grn-l);border:1px solid rgba(30,122,74,.25);color:var(--grn)}
.toast.bad{background:var(--red-l);border:1px solid rgba(192,57,43,.25);color:var(--red)}
.toast.info{background:var(--acc-l);border:1px solid var(--acc-m);color:var(--acc)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-inner">
      <div class="header-top">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
          </div>
          <div>
            <div class="brand-name">Dagstaat</div>
            <div class="brand-sub">Ordinatio Groep</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <a href="verstuur.html" style="text-decoration:none;background:var(--acc-l);border:1px solid var(--acc-m);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--acc)">Verstuur ↗</a>
          <div class="sync-pill syncing" id="syncPill" onclick="manualSync()">
            <div class="sync-dot"></div>
            <span id="syncText">Verbinden…</span>
          </div>
        </div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="switchTab('invoer',this)">Invoer</button>
      <button class="tab" onclick="switchTab('overzicht',this)">Overzicht</button>

    </div>
  </header>
  <div class="main">
    <div class="pane on" id="pane-invoer">
      <div class="date-row">
        <button class="date-nav" onclick="changeDay(-1)">‹</button>
        <div class="date-display" onclick="document.getElementById('hiddenDate').showPicker?.()">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="date-day" id="dispDay">–</div>
            <div>
              <div class="date-weekday" id="dispWeekday">–</div>
              <div class="date-month" id="dispMonth">–</div>
            </div>
          </div>
          <div class="entries-count" id="dispCount">0 blokken</div>
        </div>
        <button class="date-nav" onclick="changeDay(1)">›</button>
      </div>
      <input type="date" id="hiddenDate" class="date-input-hidden" onchange="setDate(this.value)">
      <div class="day-total" id="dayTotalCard" style="display:none">
        <div class="day-total-row">
          <div><div class="day-total-label">Totaal vandaag</div><div class="day-total-sub" id="dayTotalSub">–</div></div>
          <div class="day-total-val" id="dayTotalVal">0:00</div>
        </div>
      </div>
      <div id="entryForms"></div>
      <button class="add-entry-btn" onclick="addBlock()"><span style="font-size:16px;line-height:1">+</span> Tijdblok toevoegen</button>
      <button class="save-btn" id="saveBtn" onclick="saveDay()">Dag opslaan<div class="spin"></div></button>
    </div>
    <div class="pane" id="pane-overzicht">
      <div class="month-nav">
        <button class="mnav-btn" onclick="prevMonth()">‹</button>
        <div class="month-title" id="monthTitle">–</div>
        <button class="mnav-btn" onclick="nextMonth()">›</button>
      </div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-val blue" id="ov-days">0</div><div class="stat-lbl">Dagen</div></div>
        <div class="stat"><div class="stat-val green" id="ov-hours">0:00</div><div class="stat-lbl">Uren</div></div>
        <div class="stat"><div class="stat-val amber" id="ov-km">0</div><div class="stat-lbl">KM</div></div>
      </div>
      <p class="sec">Per opdrachtgever</p>
      <div class="client-totals" id="clientTotals"></div>
      <div style="height:14px"></div>
      <p class="sec">Alle registraties</p>
      <div class="entries-table" id="entriesTable"></div>
    </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init('LVecJZWPqdswbZbga');</script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,doc,setDoc,getDoc,onSnapshot,collection,addDoc,query,orderBy,getDocs}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB={apiKey:"AIzaSyBW4shtJ-2UlPMg1tHs3GUrNhfg6ocKxjY",authDomain:"dagstaat-ordinatio.firebaseapp.com",projectId:"dagstaat-ordinatio",storageBucket:"dagstaat-ordinatio.firebasestorage.app",messagingSenderId:"841107130686",appId:"1:841107130686:web:f91211f83a8e031746846f"};
const fbApp=initializeApp(FB);
const db=getFirestore(fbApp);

const MO=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const MOS=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const DY=['zo','ma','di','wo','do','vr','za'];
const DYL=['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const KLANTEN=['Intern','Sitech','Dysel','Seeder','HG','Nabuurs'];
const CC={Intern:'#5c6b7a',Sitech:'#2d5a8e',Dysel:'#1e7a4a',Seeder:'#b85c00',HG:'#7b3f9e',Nabuurs:'#c0392b'};

let days={},activeDate=todayISO(),vMonth=new Date().getMonth(),vYear=new Date().getFullYear(),blocks=[];

function todayISO(){const n=new Date();return`${n.getFullYear()}-${p2(n.getMonth()+1)}-${p2(n.getDate())}`}
function p2(n){return String(n).padStart(2,'0')}
function m2s(m){return`${Math.floor(m/60)}:${p2(m%60)}`}
function tMins(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m}
function bMins(b){return Math.max(0,(tMins(b.end)-tMins(b.start))-(parseInt(b.brk)||0))}
function cc(n){return CC[n]||'#8a8a84'}
function isoD(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d)}

function syncStatus(s,t){const p=document.getElementById('syncPill');p.className=`sync-pill ${s}`;document.getElementById('syncText').textContent=t}

onSnapshot(doc(db,'dagstaat','data'),(snap)=>{
  if(snap.exists()){days=snap.data().days||{};renderOverzicht();loadDayBlocks();}
  syncStatus('synced','Gesynchroniseerd');
},(err)=>{syncStatus('offline','Offline')});

async function saveToFB(){
  syncStatus('syncing','Opslaan…');
  try{await setDoc(doc(db,'dagstaat','data'),{days});syncStatus('synced','Gesynchroniseerd');}
  catch(e){syncStatus('offline','Offline');showToast('Fout: '+e.message,'bad');}
}

window.manualSync=async function(){
  syncStatus('syncing','Synchroniseren…');
  try{const s=await getDoc(doc(db,'dagstaat','data'));if(s.exists())days=s.data().days||{};renderOverzicht();loadDayBlocks();syncStatus('synced','Gesynchroniseerd');showToast('Gesynchroniseerd ✓','ok');}
  catch(e){syncStatus('offline','Offline');}
};

function init(){document.getElementById('hiddenDate').value=activeDate;setDate(activeDate)}

window.setDate=function(iso){
  activeDate=iso;document.getElementById('hiddenDate').value=iso;
  const d=isoD(iso);
  document.getElementById('dispDay').textContent=d.getDate();
  document.getElementById('dispWeekday').textContent=DYL[d.getDay()];
  document.getElementById('dispMonth').textContent=`${MO[d.getMonth()]} ${d.getFullYear()}`;
  loadDayBlocks();
}

window.changeDay=function(delta){const d=isoD(activeDate);d.setDate(d.getDate()+delta);setDate(`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`)}

function loadDayBlocks(){
  const e=days[activeDate]||[];
  blocks=e.length?e.map(b=>({...b})):[{klant:'Sitech',start:'08:00',end:'16:30',brk:30,km:0}];
  renderBlocks();
}

function renderBlocks(){
  const c=document.getElementById('entryForms');c.innerHTML='';
  blocks.forEach((b,i)=>c.appendChild(mkBlock(b,i)));
  updateTotal();
  const n=days[activeDate]?.length||0;
  document.getElementById('dispCount').textContent=`${n} blok${n!==1?'ken':''}`;
}

function mkBlock(b,i){
  const d=document.createElement('div');d.className='form-card';
  const m=bMins(b);
  d.innerHTML=`<div class="form-card-header">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:8px;height:8px;border-radius:50%;background:${cc(b.klant)};flex-shrink:0" id="dot-${i}"></div>
      <span class="form-card-title">Tijdblok ${i+1}</span>
    </div>
    ${blocks.length>1?`<button class="remove-btn" onclick="removeBlock(${i})">✕</button>`:''}
  </div>
  <div class="fg">
    <div class="field full"><label>Opdrachtgever</label>
      <select onchange="updBlock(${i},'klant',this.value)">${KLANTEN.map(k=>`<option${k===b.klant?' selected':''}>${k}</option>`).join('')}</select>
    </div>
    <div class="field"><label>Starttijd</label><input type="time" value="${b.start}" step="300" onchange="updBlock(${i},'start',this.value)"></div>
    <div class="field"><label>Eindtijd</label><input type="time" value="${b.end}" step="300" onchange="updBlock(${i},'end',this.value)"></div>
    <div class="field"><label>Pauze (min)</label><input type="number" value="${b.brk||0}" min="0" max="240" onchange="updBlock(${i},'brk',this.value)"></div>
    <div class="field"><label>KM</label><input type="number" value="${b.km||''}" min="0" max="9999" placeholder="0" onchange="updBlock(${i},'km',this.value)"></div>
  </div>
  <div class="netto-row${m>0?'':' warn'}" id="nr-${i}">
    <span class="netto-label">Netto uren</span><span class="netto-val">${m>0?m2s(m):'–'}</span>
  </div>`;
  return d;
}

window.updBlock=function(i,k,v){
  if(k==='brk'||k==='km')blocks[i][k]=parseInt(v)||0;else blocks[i][k]=v;
  const nr=document.getElementById(`nr-${i}`);
  if(nr){const m=bMins(blocks[i]);nr.className=`netto-row${m>0?'':' warn'}`;nr.querySelector('.netto-val').textContent=m>0?m2s(m):'–';}
  if(k==='klant'){const dot=document.getElementById(`dot-${i}`);if(dot)dot.style.background=cc(v);}
  updateTotal();
}

window.addBlock=function(){blocks.push({klant:'Sitech',start:'08:00',end:'16:30',brk:30,km:0});renderBlocks()}
window.removeBlock=function(i){blocks.splice(i,1);renderBlocks()}

function updateTotal(){
  const t=blocks.reduce((s,b)=>s+bMins(b),0);
  const card=document.getElementById('dayTotalCard');
  if(t>0){
    card.style.display='block';
    document.getElementById('dayTotalVal').textContent=m2s(t);
    document.getElementById('dayTotalSub').textContent=[...new Set(blocks.filter(b=>bMins(b)>0).map(b=>b.klant))].join(' · ');
  }else{card.style.display='none';}
}

window.saveDay=async function(){
  const v=blocks.filter(b=>b.start&&b.end&&bMins(b)>0);
  if(!v.length){showToast('Voer geldige tijden in','bad');return;}
  const btn=document.getElementById('saveBtn');btn.classList.add('loading');btn.disabled=true;
  days[activeDate]=v.map(b=>({...b,brk:parseInt(b.brk)||0,km:parseInt(b.km)||0}));
  await saveToFB();
  const n=days[activeDate].length;
  document.getElementById('dispCount').textContent=`${n} blok${n!==1?'ken':''}`;
  btn.classList.remove('loading');btn.disabled=false;
  showToast(`${n} blok${n!==1?'ken':''} opgeslagen ✓`,'ok');
}

window.switchTab=function(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');document.getElementById('pane-'+name).classList.add('on');
  if(name==='overzicht'){vMonth=new Date().getMonth();vYear=new Date().getFullYear();renderOverzicht();}
  if(name==='verstuur'){
    // Use requestAnimationFrame to ensure all functions are defined
    requestAnimationFrame(()=>{
      if(typeof window.initVerstuur==='function') window.initVerstuur();
      if(typeof window.updatePreview==='function') window.updatePreview();
    });
  }
}

window.prevMonth=function(){vMonth--;if(vMonth<0){vMonth=11;vYear--}renderOverzicht()}
window.nextMonth=function(){vMonth++;if(vMonth>11){vMonth=0;vYear++}renderOverzicht()}

function renderOverzicht(){
  const pfx=`${vYear}-${p2(vMonth+1)}`;
  document.getElementById('monthTitle').textContent=`${MO[vMonth]} ${vYear}`;
  const mDays=Object.keys(days).filter(d=>d.startsWith(pfx)).sort();
  const all=mDays.flatMap(k=>days[k].map(b=>({...b,date:k})));
  const tMin=all.reduce((s,b)=>s+bMins(b),0);
  const tKm=all.reduce((s,b)=>s+(b.km||0),0);
  document.getElementById('ov-days').textContent=mDays.length;
  document.getElementById('ov-hours').textContent=m2s(tMin);
  document.getElementById('ov-km').textContent=tKm;

  const map={};
  all.forEach(b=>{if(!map[b.klant])map[b.klant]={mins:0,days:new Set(),km:0};map[b.klant].mins+=bMins(b);map[b.klant].days.add(b.date);map[b.klant].km+=b.km||0;});

  const ct=document.getElementById('clientTotals');
  if(!Object.keys(map).length){ct.innerHTML='<div class="empty-state" style="padding:24px"><div class="empty-icon">📊</div><div class="empty-text">Geen data</div></div>';}
  else{ct.innerHTML=`<div class="client-totals-header"><span class="client-totals-title">Opdrachtgever</span><span style="font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px">Uren · Dagen · KM</span></div>${Object.entries(map).sort((a,b)=>b[1].mins-a[1].mins).map(([n,d])=>`<div class="client-row"><div class="client-dot" style="background:${cc(n)}"></div><div class="client-name">${n}</div><div class="client-hours">${m2s(d.mins)}</div><div class="client-days">${d.days.size}d</div><div class="client-km">${d.km?d.km+'km':''}</div></div>`).join('')}`;}

  const et=document.getElementById('entriesTable');
  if(!mDays.length){et.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Geen registraties</div></div>';return;}
  et.innerHTML=`<div class="entries-table-header"><div class="th">Datum</div><div class="th">Opdrachtgever</div><div class="th" style="text-align:right">Uren</div><div class="th" style="text-align:right">KM</div></div>${[...mDays].reverse().map(d=>{const bs=days[d];const dt=isoD(d);const tM=bs.reduce((s,b)=>s+bMins(b),0);const tK=bs.reduce((s,b)=>s+(b.km||0),0);return`<div class="entry-row" onclick="gotoDate('${d}')"><div><div class="entry-date-day">${DY[dt.getDay()]} ${dt.getDate()}</div><div style="font-size:11px;color:var(--ink3)">${MOS[dt.getMonth()]}</div></div><div>${bs.map(b=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px"><div style="width:6px;height:6px;border-radius:50%;background:${cc(b.klant)};flex-shrink:0"></div><span style="font-size:12px;font-weight:500">${b.klant}</span><span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)">${b.start}–${b.end}</span></div>`).join('')}</div><div class="entry-hours-cell">${m2s(tM)}</div><div class="entry-km-cell">${tK||''}</div></div>`;}).join('')}`;
}

window.gotoDate=function(iso){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===0));
  document.querySelectorAll('.pane').forEach((p,i)=>p.classList.toggle('on',i===0));
  setDate(iso);
}

window.showToast=function(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}

// ── VERSTUUR FUNCTIES ───────────────────────────
const MO_FULL=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

// ── INIT VERSTUUR TAB ─────────────────────────
window.initVerstuur=function(){
  // Load clients from localStorage (set by admin)
  const storedClients=JSON.parse(localStorage.getItem('dgs_clients_v1')||'[]');
  const klantList=storedClients.length?storedClients.map(c=>c.name):KLANTEN;

  const sel=document.getElementById('v-klant');
  sel.innerHTML='<option value="">Kies opdrachtgever…</option>'+
    klantList.filter(k=>k!=='Intern').map(k=>`<option value="${k}">${k}</option>`).join('');

  // Fill maand
  const mSel=document.getElementById('v-maand');
  mSel.innerHTML=MO_FULL.map((m,i)=>`<option value="${i}"${i===new Date().getMonth()?' selected':''}>${m}</option>`).join('');

  // Fill jaar
  const now=new Date();
  const ySel=document.getElementById('v-jaar');
  ySel.innerHTML=[0,1,2].map(d=>`<option value="${now.getFullYear()-d}"${d===0?' selected':''}>${now.getFullYear()-d}</option>`).join('');

  // Change listeners for preview
  ['v-maand','v-jaar'].forEach(id=>document.getElementById(id).addEventListener('change',updatePreview));

  loadVerstuurHistory();
}

window.onKlantChange=function(){
  const klant=document.getElementById('v-klant').value;
  const infoBox=document.getElementById('v-klant-info');
  const infoContent=document.getElementById('v-klant-info-content');
  const emailInput=document.getElementById('v-email');

  if(!klant){infoBox.style.display='none';return;}

  const storedClients=JSON.parse(localStorage.getItem('dgs_clients_v1')||'[]');
  const client=storedClients.find(c=>c.name===klant);

  if(client){
    let info='';
    if(client.contact) info+=`<span style="font-weight:500">${client.contact}</span>`;
    if(client.address) info+=` · ${client.address}`;
    if(client.city) info+=`, ${client.city}`;
    if(client.phone) info+=` · ${client.phone}`;
    infoContent.innerHTML=info||'<span style="color:var(--ink3)">Geen extra gegevens</span>';
    if(client.email) emailInput.value=client.email;
    else emailInput.value='';
    infoBox.style.display='block';
  } else {
    infoBox.style.display='none';
    emailInput.value='';
  }
  updatePreview();
}

window.updatePreview=function(){
  const klant=document.getElementById('v-klant').value;
  const maand=parseInt(document.getElementById('v-maand').value);
  const jaar=parseInt(document.getElementById('v-jaar').value);
  const preview=document.getElementById('v-preview');
  const content=document.getElementById('v-preview-content');
  if(!klant){preview.style.display='none';return;}

  const pfx=`${jaar}-${p2(maand+1)}`;
  const mDays=Object.keys(days).filter(d=>d.startsWith(pfx)).sort();
  const klantBlocks=mDays.flatMap(k=>days[k].filter(b=>b.klant===klant).map(b=>({...b,date:k})));

  if(!klantBlocks.length){
    content.innerHTML=`<p style="font-size:13px;color:var(--ink3)">Geen registraties voor ${klant} in ${MO_FULL[maand]} ${jaar}.</p>`;
    preview.style.display='block';
    return;
  }

  const totalMins=klantBlocks.reduce((s,b)=>s+bMins(b),0);
  content.innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:13px;font-weight:600;color:var(--ink)">${klant} · ${MO_FULL[maand]} ${jaar}</span>
      <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--acc)">${m2s(totalMins)}</span>
    </div>
    <p style="font-size:12px;color:var(--ink3)">${klantBlocks.length} registratie${klantBlocks.length!==1?'s':''}</p>`;
  preview.style.display='block';
}

window.verstuurSpec=async function(){
  const klant=document.getElementById('v-klant').value;
  const email=document.getElementById('v-email').value.trim();
  const maand=parseInt(document.getElementById('v-maand').value);
  const jaar=parseInt(document.getElementById('v-jaar').value);

  if(!klant){showToast('Kies een opdrachtgever','bad');return;}
  if(!email||!email.includes('@')){showToast('Voer een geldig emailadres in','bad');return;}

  const pfx=`${jaar}-${p2(maand+1)}`;
  const mDays=Object.keys(days).filter(d=>d.startsWith(pfx)).sort();
  const klantBlocks=mDays.flatMap(k=>days[k].filter(b=>b.klant===klant).map(b=>({...b,date:k})));

  if(!klantBlocks.length){showToast('Geen registraties voor deze periode','bad');return;}

  const btn=document.getElementById('v-send-btn');
  btn.classList.add('loading');btn.disabled=true;

  try{
    // Save spec to Firebase
    const totalMins=klantBlocks.reduce((s,b)=>s+bMins(b),0);
    const specRef=await addDoc(collection(db,'specs'),{
      klant,maand,jaar,email,
      regels:klantBlocks,
      totaal_mins:totalMins,
      verstuurd_datum:new Date().toISOString(),
      akkoord:false,
      akkoord_datum:null
    });

    const specId=specRef.id;
    const akkoordLink=`https://rene-linden.github.io/ERP/accordeer.html?id=${specId}`;
    const afkeurLink=`https://rene-linden.github.io/ERP/accordeer.html?id=${specId}&actie=afkeuren`;
    const maandStr=`${MO_FULL[maand]} ${jaar}`;

    // Build HTML table for email
    const DY_SHORT=['zo','ma','di','wo','do','vr','za'];
    const MOS=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
    const tabelHTML=`<table style="width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:13px">
      <thead><tr style="background:#f0f4f8">
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8daf0;color:#2d5a8e">Datum</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8daf0;color:#2d5a8e">Start</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8daf0;color:#2d5a8e">Eind</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8daf0;color:#2d5a8e">Pauze</th>
        <th style="padding:8px 10px;text-align:right;border-bottom:2px solid #c8daf0;color:#2d5a8e">Uren</th>
      </tr></thead>
      <tbody>${klantBlocks.map((b,i)=>{
        const d=new Date(b.date);const mins=bMins(b);
        return`<tr style="background:${i%2===0?'#ffffff':'#f8f7f4'}">
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;font-weight:600">${DY_SHORT[d.getDay()]} ${d.getDate()} ${MOS[d.getMonth()]}</td>
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;font-family:monospace">${b.start}</td>
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;font-family:monospace">${b.end}</td>
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;color:#8a8a84">${b.brk||0}min</td>
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;text-align:right;font-weight:600;font-family:monospace;color:#2d5a8e">${m2s(mins)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;

    // Send via EmailJS
    await emailjs.send('service_rpek59r','template_p4r2rkp',{
      to_email: email,
      klant: klant,
      naam: 'Rene van der Linden',
      maand: maandStr,
      tabel: tabelHTML,
      totaal_uren: m2s(totalMins),
      akkoord_link: akkoordLink,
      afkeur_link: afkeurLink,
      email: 'info@renevanderlinden.com'
    });

    showToast(`Email verstuurd naar ${email} ✓`,'ok');
    loadVerstuurHistory();
    document.getElementById('v-email').value='';
  }catch(e){
    showToast('Fout bij versturen: '+e.message,'bad');
    console.error(e);
  }finally{
    btn.classList.remove('loading');btn.disabled=false;
  }
}

async function loadVerstuurHistory(){
  const el=document.getElementById('v-history');
  try{
    const q=query(collection(db,'specs'),orderBy('verstuurd_datum','desc'));
    const snap=await getDocs(q);
    if(snap.empty){
      el.innerHTML='<div class="empty-state"><div class="empty-icon">📨</div><div class="empty-text">Nog niets verstuurd</div></div>';
      return;
    }
    el.innerHTML=snap.docs.map(doc=>{
      const d=doc.data();
      const vd=new Date(d.verstuurd_datum);
      const maandStr=`${MO_FULL[d.maand]} ${d.jaar}`;
      const statusColor=d.akkoord?'var(--grn)':'var(--amb)';
      const statusBg=d.akkoord?'var(--grn-l)':'var(--amb-l)';
      const statusText=d.akkoord?'✓ Akkoord':'⏳ Wacht';
      return`<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--ink)">${d.klant} · ${maandStr}</div>
          <div style="font-size:11px;color:var(--ink3);margin-top:2px">${d.email} · ${vd.getDate()} ${['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][vd.getMonth()]}</div>
        </div>
        <div style="background:${statusBg};color:${statusColor};font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px">${statusText}</div>
      </div>`;
    }).join('')+'<div style="height:1px"></div>';
  }catch(e){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📨</div><div class="empty-text">Laden mislukt</div></div>';
  }
}

init();

setTimeout(function(){window.initVerstuur&&window.initVerstuur();},500);
</script>
