<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f8f7f4">
<title>Verstuur — Ordinatio Groep</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#f8f7f4;--white:#fff;--ink:#1a1a18;--ink2:#4a4a46;--ink3:#8a8a84;
  --line:#e8e7e2;--line2:#d4d3cc;
  --acc:#2d5a8e;--acc-l:#edf3f9;--acc-m:#c8daf0;
  --grn:#1e7a4a;--grn-l:#eaf5ee;
  --amb:#b85c00;--amb-l:#fdf3e8;
  --red:#c0392b;--red-l:#fdf0ee;
  --r:12px;--rsm:8px;--rxs:6px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.06),0 2px 6px rgba(0,0,0,.04);
}
html,body{background:var(--cream);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--white);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;padding:env(safe-area-inset-top) 0 0}
.hinner{padding:14px 20px}
.hrow{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.bicon{width:34px;height:34px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center}
.bicon svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bname{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--ink)}
.bsub{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--ink3);text-decoration:none;background:var(--cream);border:1px solid var(--line2);border-radius:20px;padding:5px 12px}
.tabs{display:flex;border-top:1px solid var(--line)}
.tab{flex:1;padding:11px 0;text-align:center;font-size:13px;font-weight:500;color:var(--ink3);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.main{flex:1;overflow-y:auto;padding-bottom:20px}
.pane{display:none;padding:20px}
.pane.on{display:block}
.sec{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink3);font-weight:600;margin-bottom:10px}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field:last-child{margin-bottom:0}
label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);font-weight:600}
input,select,textarea{background:var(--cream);border:1px solid var(--line2);border-radius:var(--rsm);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 12px;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--acc);background:var(--white);box-shadow:0 0 0 3px var(--acc-l)}
select{cursor:pointer}
textarea{resize:vertical;min-height:80px;font-size:14px;line-height:1.5}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.preview-card{background:var(--acc-l);border:1px solid var(--acc-m);border-radius:var(--rsm);padding:14px;margin-bottom:14px}
.preview-title{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--acc);font-weight:600;margin-bottom:10px}
.preview-table{width:100%;border-collapse:collapse}
.preview-table th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--acc);padding:6px 8px;text-align:left;border-bottom:1px solid var(--acc-m)}
.preview-table td{padding:7px 8px;font-size:13px;color:var(--ink2);border-bottom:1px solid rgba(59,158,255,.1)}
.preview-table tr:last-child td{border-bottom:none}
.preview-total{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--acc-m)}
.preview-total-label{font-size:13px;font-weight:600;color:var(--acc)}
.preview-total-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:var(--acc)}
.send-btn{width:100%;background:var(--acc);color:white;border:none;border-radius:var(--rsm);padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.send-btn:hover{background:#234d7a}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn .spin{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:sp .7s linear infinite}
.send-btn.loading .spin{display:block}
.send-btn.loading .btn-icon{display:none}
@keyframes sp{to{transform:rotate(360deg)}}
.hist-item{border-bottom:1px solid var(--line)}
.hist-item:last-child{border-bottom:none}
.hist-header{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .1s}
.hist-header:hover{background:var(--cream)}
.hist-body-text{flex:1}
.hist-title{font-size:13px;font-weight:600;color:var(--ink)}
.hist-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.hist-detail{display:none;padding:12px 16px;background:var(--cream);border-top:1px solid var(--line)}
.hist-detail.on{display:block}
.status-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.status-pill.ok{background:var(--grn-l);color:var(--grn)}
.status-pill.wait{background:var(--amb-l);color:var(--amb)}
.det-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.det-table th{color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:5px 8px;text-align:left;border-bottom:1px solid var(--line2)}
.det-table td{padding:6px 8px;border-bottom:1px solid var(--line);color:var(--ink2)}
.det-table tr:last-child td{border-bottom:none}
.act-row{display:flex;gap:8px;flex-wrap:wrap}
.abtn{background:none;border:1px solid var(--line2);border-radius:var(--rxs);padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink3);transition:all .15s}
.abtn:hover{border-color:var(--acc-m);color:var(--acc);background:var(--acc-l)}
.abtn.del:hover{border-color:var(--red);color:var(--red);background:var(--red-l)}
.abtn.reset:hover{border-color:var(--amb);color:var(--amb);background:var(--amb-l)}
.acc-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--grn);background:var(--grn-l);border:1px solid rgba(30,122,74,.2);border-radius:var(--rxs);padding:6px 12px}
.empty{text-align:center;padding:40px 20px;color:var(--ink3)}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}
.empty-text{font-size:14px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);border-radius:20px;padding:10px 18px;font-size:13px;font-weight:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;max-width:92vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--grn-l);border:1px solid rgba(30,122,74,.25);color:var(--grn)}
.toast.bad{background:var(--red-l);border:1px solid rgba(192,57,43,.25);color:var(--red)}
.toast.info{background:var(--acc-l);border:1px solid var(--acc-m);color:var(--acc)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:4px}
.sync-dot.off{background:var(--red)}
.sync-dot.wait{background:var(--amb)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-dot.syncing{animation:pulse .8s infinite;background:var(--amb)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hinner">
      <div class="hrow">
        <div class="brand">
          <div class="bicon">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
          </div>
          <div>
            <div class="bname">Verstuur</div>
            <div class="bsub"><span class="sync-dot syncing" id="syncDot"></span><span id="syncTxt">Verbinden…</span></div>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <a href="factuur.html" class="back-btn" style="background:var(--acc);color:white;border-color:var(--acc)">🧾 Factuur</a>
          <a href="index.html" class="back-btn">← Dagstaat</a>
        </div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="showTab('uren',this)">Urenspecificatie</button>
      <button class="tab" onclick="showTab('history',this)">Geschiedenis</button>
    </div>
  </header>

  <div class="main">
    <!-- UREN -->
    <div class="pane on" id="pane-uren">
      <p class="sec">Opdrachtgever & periode</p>
      <div class="card">
        <div class="field">
          <label>Opdrachtgever</label>
          <select id="v-klant">
            <option value="">Kies opdrachtgever…</option>
          </select>
        </div>
        <div class="fg2">
          <div class="field">
            <label>Maand</label>
            <select id="v-maand"></select>
          </div>
          <div class="field">
            <label>Jaar</label>
            <select id="v-jaar"></select>
          </div>
        </div>
      </div>

      <div class="preview-card" id="previewCard" style="display:none">
        <div class="preview-title">Overzicht te versturen uren</div>
        <table class="preview-table">
          <thead><tr><th>Datum</th><th>Start</th><th>Eind</th><th style="text-align:right">Uren</th></tr></thead>
          <tbody id="previewBody"></tbody>
        </table>
        <div class="preview-total">
          <span class="preview-total-label">Totaal</span>
          <span class="preview-total-val" id="previewTotal">–</span>
        </div>
      </div>

      <div id="noDataMsg" style="display:none;background:var(--amb-l);border:1px solid rgba(184,92,0,.2);border-radius:var(--rsm);padding:12px 14px;font-size:13px;color:var(--amb);margin-bottom:14px">
        Geen registraties gevonden voor deze combinatie.
      </div>

      <p class="sec">Ontvanger</p>
      <div class="card">
        <div class="field" id="klantInfoWrap" style="display:none">
          <div id="klantInfoTxt" style="background:var(--cream);border-radius:var(--rsm);padding:10px 12px;font-size:13px;color:var(--ink2);line-height:1.7"></div>
        </div>
        <div class="field">
          <label>Emailadres ontvanger</label>
          <input type="email" id="v-email" placeholder="naam@bedrijf.nl">
        </div>
        <div class="field">
          <label>Begeleidende tekst (optioneel)</label>
          <textarea id="v-note" placeholder="Bijv. Hierbij de urenspecificatie voor april."></textarea>
        </div>
      </div>

      <button class="send-btn" id="sendBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <div class="spin"></div>
        Verstuur urenspecificatie
      </button>
    </div>

    <!-- GESCHIEDENIS -->
    <div class="pane" id="pane-history">
      <p class="sec">Verstuurde specificaties</p>
      <div class="card" style="padding:0;overflow:hidden" id="historyList">
        <div class="empty"><div class="empty-icon">📨</div><div class="empty-text">Laden…</div></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,doc,getDoc,deleteDoc,updateDoc,onSnapshot,collection,addDoc,query,orderBy,getDocs}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB={
  apiKey:"AIzaSyBW4shtJ-2UlPMg1tHs3GUrNhfg6ocKxjY",
  authDomain:"dagstaat-ordinatio.firebaseapp.com",
  projectId:"dagstaat-ordinatio",
  storageBucket:"dagstaat-ordinatio.firebasestorage.app",
  messagingSenderId:"841107130686",
  appId:"1:841107130686:web:f91211f83a8e031746846f"
};

emailjs.init('LVecJZWPqdswbZbga');
const app = initializeApp(FB);
const db = getFirestore(app);

const MO = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const MOS = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const DY = ['zo','ma','di','wo','do','vr','za'];

let days = {};
let clients = [];

// ── HELPERS ───────────────────────────────────
const p2 = n => String(n).padStart(2,'0');
const m2s = m => `${Math.floor(m/60)}:${p2(m%60)}`;
const tMins = t => { if(!t) return 0; const[h,m]=t.split(':').map(Number); return h*60+m; };
const bMins = b => Math.max(0, (tMins(b.end)-tMins(b.start)) - (parseInt(b.brk)||0));

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

function setSync(s, txt) {
  const d = document.getElementById('syncDot');
  const t = document.getElementById('syncTxt');
  d.className = `sync-dot ${s}`;
  t.textContent = txt;
}

// ── LOAD DATA ─────────────────────────────────
onSnapshot(doc(db,'dagstaat','data'), snap => {
  days = snap.exists() ? (snap.data().days || {}) : {};
  setSync('', 'Gesynchroniseerd');
  buildPreview();
}, err => {
  setSync('off', 'Offline');
});

function loadClients() {
  clients = JSON.parse(localStorage.getItem('dgs_clients_v1') || '[]');
  if (!clients.length) {
    clients = [
      {name:'Sitech',rate:115,color:'#2d5a8e',email:'',contact:'',phone:'',address:'',city:''},
      {name:'Dysel',rate:110,color:'#1e7a4a',email:'',contact:'',phone:'',address:'',city:''},
      {name:'Seeder',rate:110,color:'#b85c00',email:'',contact:'',phone:'',address:'',city:''},
      {name:'HG',rate:110,color:'#7b3f9e',email:'',contact:'',phone:'',address:'',city:''},
      {name:'Nabuurs',rate:110,color:'#c0392b',email:'',contact:'',phone:'',address:'',city:''},
    ];
  }
}

// ── INIT ──────────────────────────────────────
function init() {
  loadClients();

  // Klant dropdown
  const sel = document.getElementById('v-klant');
  sel.innerHTML = '<option value="">Kies opdrachtgever…</option>' +
    clients.filter(c => c.name !== 'Intern')
           .map(c => `<option value="${c.name}">${c.name}</option>`)
           .join('');
  sel.addEventListener('change', onKlantChange);

  // Maand dropdown
  const now = new Date();
  const mSel = document.getElementById('v-maand');
  mSel.innerHTML = MO.map((m,i) =>
    `<option value="${i}"${i===now.getMonth()?' selected':''}>${m}</option>`
  ).join('');
  mSel.addEventListener('change', buildPreview);

  // Jaar dropdown
  const ySel = document.getElementById('v-jaar');
  ySel.innerHTML = [0,1,2].map(d =>
    `<option value="${now.getFullYear()-d}"${d===0?' selected':''}>${now.getFullYear()-d}</option>`
  ).join('');
  ySel.addEventListener('change', buildPreview);

  // Send button
  document.getElementById('sendBtn').addEventListener('click', verstuur);
}

// ── KLANT CHANGE ──────────────────────────────
function onKlantChange() {
  const name = document.getElementById('v-klant').value;
  const wrap = document.getElementById('klantInfoWrap');
  const txt = document.getElementById('klantInfoTxt');
  const emailEl = document.getElementById('v-email');

  const c = clients.find(x => x.name === name);
  if (c && (c.contact || c.address || c.phone || c.email)) {
    let info = '';
    if (c.contact) info += `<strong>${c.contact}</strong><br>`;
    if (c.address) info += `${c.address}<br>`;
    if (c.city) info += `${c.city}<br>`;
    if (c.phone) info += `📞 ${c.phone}`;
    txt.innerHTML = info;
    wrap.style.display = 'block';
    if (c.email) emailEl.value = c.email;
  } else {
    wrap.style.display = 'none';
    emailEl.value = '';
  }
  buildPreview();
}

// ── BUILD PREVIEW ─────────────────────────────
function buildPreview() {
  const klant = document.getElementById('v-klant').value;
  const maand = parseInt(document.getElementById('v-maand').value);
  const jaar = parseInt(document.getElementById('v-jaar').value);
  const card = document.getElementById('previewCard');
  const noData = document.getElementById('noDataMsg');

  if (!klant) { card.style.display='none'; noData.style.display='none'; return; }

  const pfx = `${jaar}-${p2(maand+1)}`;
  const regels = Object.keys(days)
    .filter(d => d.startsWith(pfx))
    .sort()
    .flatMap(k => days[k].filter(b => b.klant === klant).map(b => ({...b, date:k})));

  if (!regels.length) {
    card.style.display = 'none';
    noData.style.display = 'block';
    return;
  }
  noData.style.display = 'none';

  const totalMins = regels.reduce((s,r) => s+bMins(r), 0);
  document.getElementById('previewBody').innerHTML = regels.map(r => {
    const d = new Date(r.date);
    return `<tr>
      <td><strong>${DY[d.getDay()]} ${d.getDate()} ${MOS[d.getMonth()]}</strong></td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${r.start}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${r.end}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:600">${m2s(bMins(r))}</td>
    </tr>`;
  }).join('');
  document.getElementById('previewTotal').textContent = m2s(totalMins);
  card.style.display = 'block';
}

// ── VERSTUUR ──────────────────────────────────
async function verstuur() {
  const klant = document.getElementById('v-klant').value;
  const email = document.getElementById('v-email').value.trim();
  const maand = parseInt(document.getElementById('v-maand').value);
  const jaar = parseInt(document.getElementById('v-jaar').value);
  const note = document.getElementById('v-note').value.trim();

  if (!klant) { toast('Kies een opdrachtgever', 'bad'); return; }
  if (!email || !email.includes('@')) { toast('Voer een geldig emailadres in', 'bad'); return; }

  const pfx = `${jaar}-${p2(maand+1)}`;
  const regels = Object.keys(days)
    .filter(d => d.startsWith(pfx))
    .sort()
    .flatMap(k => days[k].filter(b => b.klant === klant).map(b => ({...b, date:k})));

  if (!regels.length) { toast('Geen registraties voor deze periode', 'bad'); return; }

  // Check if already an approved spec exists for this klant+maand+jaar
  const bestaandQ = query(collection(db,'specs'),
    orderBy('verstuurd_datum','desc'));
  const bestaandSnap = await getDocs(bestaandQ);
  const alGeaccordeerd = bestaandSnap.docs.some(d => {
    const data = d.data();
    return data.klant === klant && data.maand === maand && data.jaar === jaar && data.akkoord === true;
  });
  if (alGeaccordeerd) {
    toast('Er is al een geaccordeerde specificatie voor deze periode', 'bad');
    return;
  }

  const btn = document.getElementById('sendBtn');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    const totalMins = regels.reduce((s,r) => s+bMins(r), 0);
    const maandStr = `${MO[maand]} ${jaar}`;

    // Save to Firebase
    const specRef = await addDoc(collection(db,'specs'), {
      klant, maand, jaar, email,
      regels: regels.map(r => ({klant:r.klant, start:r.start, end:r.end, brk:r.brk||0, km:r.km||0, date:r.date})),
      totaal_mins: totalMins,
      verstuurd_datum: new Date().toISOString(),
      akkoord: false,
      akkoord_datum: null,
      note
    });

    const akkoordLink = `https://rene-linden.github.io/ERP/accordeer.html?id=${specRef.id}`;

    // Build email table
    const noteHTML = note ? `<p style="font-family:Arial,sans-serif;font-size:14px;color:#4a4a46;margin:0 0 16px;font-style:italic">${note}</p>` : '';
    const tabelHTML = noteHTML + `<table style="width:100%;border-collapse:collapse;font-size:13px;font-family:Arial,sans-serif">
      <thead><tr style="background:#edf3f9">
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8daf0;color:#2d5a8e">Datum</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8daf0;color:#2d5a8e">Start</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8daf0;color:#2d5a8e">Eind</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid #c8daf0;color:#2d5a8e">Pauze</th>
        <th style="padding:8px 10px;text-align:right;border-bottom:2px solid #c8daf0;color:#2d5a8e">Uren</th>
      </tr></thead>
      <tbody>${regels.map((r,i) => {
        const d = new Date(r.date);
        return `<tr style="background:${i%2===0?'#fff':'#f8f7f4'}">
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;font-weight:600">${DY[d.getDay()]} ${d.getDate()} ${MOS[d.getMonth()]}</td>
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;font-family:monospace">${r.start}</td>
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;font-family:monospace">${r.end}</td>
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;color:#8a8a84">${r.brk||0}min</td>
          <td style="padding:8px 10px;border-bottom:1px solid #e8e7e2;text-align:right;font-weight:600;font-family:monospace;color:#2d5a8e">${m2s(bMins(r))}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;

    await emailjs.send('service_rpek59r','template_p4r2rkp', {
      to_email: email,
      klant: klant,
      naam: 'Rene van der Linden',
      maand: maandStr,
      tabel: tabelHTML,
      totaal_uren: m2s(totalMins),
      akkoord_link: akkoordLink,
      email: 'info@renevanderlinden.com'
    });

    toast(`Verstuurd naar ${email} ✓`, 'ok');
    document.getElementById('v-note').value = '';
    document.getElementById('v-email').value = '';
    document.getElementById('v-klant').value = '';
    document.getElementById('previewCard').style.display = 'none';
    loadHistory();

  } catch(e) {
    console.error(e);
    toast('Fout: ' + e.message, 'bad');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ── HISTORY ───────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('historyList');
  el.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Laden…</div></div>';
  try {
    const q = query(collection(db,'specs'), orderBy('verstuurd_datum','desc'));
    const snap = await getDocs(q);

    if (snap.empty) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📨</div><div class="empty-text">Nog niets verstuurd</div></div>';
      return;
    }

    el.innerHTML = '';
    snap.docs.forEach(d => {
      const id = d.id;
      const data = d.data();
      const vd = new Date(data.verstuurd_datum);
      const totalMins = data.totaal_mins || (data.regels||[]).reduce((s,r) => s+bMins(r), 0);
      const akkDatum = data.akkoord_datum
        ? new Date(data.akkoord_datum).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'})
        : '';

      // Create item element
      const item = document.createElement('div');
      item.className = 'hist-item';

      // Header
      const header = document.createElement('div');
      header.className = 'hist-header';
      header.innerHTML = `
        <div class="hist-body-text">
          <div class="hist-title">${data.klant} — ${MO[data.maand]} ${data.jaar}</div>
          <div class="hist-sub">${data.email} · ${vd.getDate()} ${MOS[vd.getMonth()]} · ${m2s(totalMins)}</div>
        </div>
        <div class="status-pill ${data.akkoord?'ok':'wait'}">${data.akkoord?'✓ Akkoord':'⏳ Wacht'}</div>
        <span style="color:var(--ink3);font-size:14px;margin-left:6px">›</span>`;

      // Detail
      const detail = document.createElement('div');
      detail.className = 'hist-detail';
      detail.id = 'det-' + id;

      // Build detail content
      let detHTML = '';
      if (data.akkoord && akkDatum) {
        detHTML += `<div style="font-size:12px;color:var(--grn);margin-bottom:10px;font-weight:500">✓ Geaccordeerd op ${akkDatum}</div>`;
      }

      // Table of regels
      detHTML += `<table class="det-table">
        <thead><tr><th>Datum</th><th>Start</th><th>Eind</th><th>Pauze</th><th style="text-align:right">Uren</th></tr></thead>
        <tbody>${(data.regels||[]).map(r => {
          const rd = new Date(r.date);
          return `<tr>
            <td><strong>${DY[rd.getDay()]} ${rd.getDate()} ${MOS[rd.getMonth()]}</strong></td>
            <td style="font-family:'DM Mono',monospace">${r.start}</td>
            <td style="font-family:'DM Mono',monospace">${r.end}</td>
            <td style="color:var(--ink3)">${r.brk||0}min</td>
            <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:600;color:var(--acc)">${m2s(bMins(r))}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;

      // Action buttons
      detHTML += '<div class="act-row">';
      if (data.akkoord) {
        detHTML += `<span class="acc-badge">✓ Geaccordeerd — aanpassen niet mogelijk</span>`;
        detHTML += `<button class="abtn reset" data-id="${id}" data-action="reset">⟳ Reset akkoord</button>`;
      } else {
        detHTML += `<button class="abtn" data-id="${id}" data-action="herstuur">↺ Opnieuw versturen</button>`;
        detHTML += `<button class="abtn del" data-id="${id}" data-action="delete">✕ Verwijderen</button>`;
      }
      detHTML += '</div>';

      detail.innerHTML = detHTML;

      // Toggle detail on header click
      header.addEventListener('click', () => {
        detail.classList.toggle('on');
      });

      // Action button handlers
      detail.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          const action = btn.dataset.action;
          const specId = btn.dataset.id;

          if (action === 'delete') {
            if (!confirm('Specificatie definitief verwijderen?')) return;
            await deleteDoc(doc(db,'specs',specId));
            toast('Verwijderd', 'info');
            loadHistory();

          } else if (action === 'reset') {
            if (!confirm('Akkoord ongedaan maken?')) return;
            await updateDoc(doc(db,'specs',specId), {akkoord:false, akkoord_datum:null});
            toast('Akkoord gereset', 'info');
            loadHistory();

          } else if (action === 'herstuur') {
            // Load data back into form
            const snap2 = await getDoc(doc(db,'specs',specId));
            if (!snap2.exists()) return;
            const d2 = snap2.data();
            showTab('uren', document.querySelector('.tab'));
            document.getElementById('v-klant').value = d2.klant;
            onKlantChange();
            document.getElementById('v-maand').value = d2.maand;
            document.getElementById('v-jaar').value = d2.jaar;
            if (d2.email) document.getElementById('v-email').value = d2.email;
            buildPreview();
            toast('Gegevens ingeladen — pas aan en verstuur opnieuw', 'info');
          }
        });
      });

      item.appendChild(header);
      item.appendChild(detail);
      el.appendChild(item);
    });

  } catch(e) {
    console.error(e);
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Laden mislukt: ' + e.message + '</div></div>';
  }
}

// ── TABS ──────────────────────────────────────
window.showTab = function(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('pane-' + name).classList.add('on');
  if (name === 'history') loadHistory();
};

init();
</script>
