.log{margin-top:14px;background:#f8f7f4;border:1px solid #e8e7e2;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;max-height:280px;overflow-y:auto;line-height:1.8;display:none}

.done{background:#eaf5ee;border:1px solid rgba(30,122,74,.2);border-radius:8px;padding:12px;font-size:13px;color:#1e7a4a;font-weight:600;margin-top:10px;display:none}

<body>
<div class="card">
  <h1>🔄 Re-import Omzet 2025</h1>
  <p>Dit verwijdert de bestaande (lege) 2025 facturen en importeert ze opnieuw met de correcte uren en bedragen.</p>

  <button class="btn red" id="deleteBtn" onclick="deleteExisting()">Stap 1: Verwijder bestaande 2025 facturen</button>
  <button class="btn" id="importBtn" onclick="startImport()" disabled>Stap 2: Importeer correct</button>
  <div class="log" id="log"></div>
  <div class="done" id="done">✓ Klaar! Ga naar Beheer → Omzet → kies 2025 om de resultaten te zien. Verwijder deze pagina van GitHub.</div>
</div>

<script type="module">

  {nummer:'ORDGR-2025001',klant:'Luke Recruitement',spec:{maand:0,jaar:2025},datum:'2025-01-31',uren:144.25,tarief:110,km:1506,kmTarief:0.21,extraKosten:[],btwPct:21,omschrijving:'Interim werkzaamheden januari 2025',verstuurd_datum:'2025-01-31T12:00:00.000Z',status:'verstuurd',regels:[]},

  {nummer:'ORDGR-2025003',klant:'Sitech Nederland B.V.',spec:{maand:4,jaar:2025},datum:'2025-05-31',uren:144.5,tarief:115,km:2420,kmTarief:0.21,extraKosten:[],btwPct:21,omschrijving:'Interim Operationeel Manager mei 2025',verstuurd_datum:'2025-05-31T12:00:00.000Z',status:'verstuurd',regels:[]},
  {nummer:'ORDGR-2025004',klant:'Sitech Nederland B.V.',spec:{maand:5,jaar:2025},datum:'2025-06-30',uren:143.75,tarief:115,km:2356,kmTarief:0.21,extraKosten:[],btwPct:21,omschrijving:'Interim Operationeel Manager juni 2025',verstuurd_datum:'2025-06-30T12:00:00.000Z',status:'verstuurd',regels:[]},
  {nummer:'ORDGR-2025005',klant:'Sitech Nederland B.V.',spec:{maand:6,jaar:2025},datum:'2025-07-31',uren:100,tarief:115,km:1612,kmTarief:0.21,extraKosten:[],btwPct:21,omschrijving:'Interim Operationeel Manager juli 2025',verstuurd_datum:'2025-07-31T12:00:00.000Z',status:'verstuurd',regels:[]},

];

function log(msg, type='info'){
  const el=document.getElementById('log');
  el.style.display='block';
  el.innerHTML+=`<div class="${type}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

window.deleteExisting = async function(){
  const btn=document.getElementById('deleteBtn');
  btn.disabled=true; btn.textContent='Bezig met verwijderen…';
  log('Zoeken naar bestaande 2025 facturen…','info');
  try{
    const snap=await getDocs(collection(db,'facturen'));
    const to2025=snap.docs.filter(d=>{
      const data=d.data();
      const spec=data.spec||{};
      return spec.jaar===2025 || (data.nummer||'').includes('2025');
    });
    log(`${to2025.length} facturen gevonden om te verwijderen…`,'info');
    for(const d of to2025){
      await deleteDoc(doc(db,'facturen',d.id));
      log(`✓ Verwijderd: ${d.data().nummer}`,'ok');
      await new Promise(r=>setTimeout(r,100));
    }
    log(`──────────────────`,'info');
    log(`Klaar — ${to2025.length} verwijderd. Klik nu op Stap 2.`,'ok');
    document.getElementById('importBtn').disabled=false;
    btn.textContent='✓ Verwijderd';
  }catch(e){
    log(`Fout: ${e.message}`,'err');
    btn.disabled=false;
    btn.textContent='Stap 1: Verwijder bestaande 2025 facturen';
  }
};

window.startImport = async function(){
  const btn=document.getElementById('importBtn');
  btn.disabled=true; btn.textContent='Importeren…';
  log('Start import met correcte uren en bedragen…','info');
  let ok=0, err=0;
  for(const f of facturen2025){
    try{
      await addDoc(collection(db,'facturen'),f);
      const subtotaal=(f.uren*f.tarief)+(f.km*f.kmTarief)+(f.extraKosten.reduce((s,k)=>s+(k.bedrag||0),0));
      const incl=subtotaal*1.21;
      log(`✓ ${f.nummer} — ${f.uren}u × €${f.tarief} — Incl. BTW: € ${incl.toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2})}`,'ok');
      ok++;
      await new Promise(r=>setTimeout(r,150));
    }catch(e){
      log(`✗ ${f.nummer}: ${e.message}`,'err');
      err++;
    }
  }
  log(`──────────────────`,'info');
  log(`Klaar: ${ok} ingevoerd, ${err} fouten`,'info');
  btn.textContent='✓ Import voltooid';
  if(err===0) document.getElementById('done').style.display='block';
};
</script>
</body>
</html>
